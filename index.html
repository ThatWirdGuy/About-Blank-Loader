<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActivityLab</title>

<style>
  /* ===== PAGE / BACKGROUND BEVEL ===== */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #bcbcbc;

    box-shadow:
      inset 4px 4px 0 #ffffff,
      inset -4px -4px 0 #8a8a8a,
      inset 8px 8px 0 #dfdfdf,
      inset -8px -8px 0 #5a5a5a;
  }

  /* ===== LOADING SCREEN ===== */
  #loadingScreen {
    position: fixed;
    inset: 0;
    background: #bcbcbc;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    z-index: 100;
    transition: opacity 0.25s ease;
  }

  #loadingScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== CENTER PANEL (BEVELED) ===== */
  #menuWrapper {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #menu {
    background: #e0e0e0;
    padding: 60px 80px;
    border-radius: 12px;
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.9),
      inset -3px -3px 0 rgba(0,0,0,0.35),
      8px 8px 16px rgba(0,0,0,0.35);
  }

  #menuContent {
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  /* ===== BUTTONS ===== */
  .btn {
    background: linear-gradient(145deg, #00ff33, #00c82a);
    color: white;
    font-size: 24px;
    padding: 15px 34px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    outline: none;

    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.45),
      inset -2px -2px 0 rgba(0,0,0,0.35),
      5px 5px 10px rgba(0,0,0,0.45);

    transition:
      transform 0.08s ease,
      box-shadow 0.08s ease,
      filter 0.12s ease;
  }

  .btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.55),
      inset -2px -2px 0 rgba(0,0,0,0.3),
      8px 8px 16px rgba(0,0,0,0.5),
      0 0 12px rgba(0,255,60,0.45);
  }

  .btn:active {
    transform: translateY(1px);
    filter: brightness(0.95);
    box-shadow:
      inset -3px -3px 0 rgba(255,255,255,0.45),
      inset 3px 3px 0 rgba(0,0,0,0.5),
      2px 2px 6px rgba(0,0,0,0.6);
  }

  /* ===== IFRAME ===== */
  #iframeContainer {
    position: fixed;
    inset: 0;
    display: none;
    background: #000;
  }

  #iframeContainer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<div id="loadingScreen">Loading...</div>

<div id="menuWrapper">
  <div id="menu">
    <div id="menuContent">
      <button class="btn" onclick="playOnSite()">Play On Site</button>
      <button class="btn" style="margin-top:10px;" onclick="openFullscreen()">Fullscreen</button>
    </div>
  </div>
</div>

<div id="iframeContainer">
  <iframe id="siteFrame" allowfullscreen></iframe>
</div>

<script>
  // --- CONFIGURATION ---
  
  // 1. Your Main URL (e.g., google.com)
  const BASE_URL = "https://race-online-skem.vercel.app"; 

  // 2. Your Subfolder (e.g., /games/subfolder)
  // LEAVE AS "" IF YOU DON'T WANT A SUBFOLDER.
  const SUB_FOLDER = ""; 

  // --- URL CONSTRUCTION LOGIC ---
  // This logic automatically ignores SUB_FOLDER if it's empty
  // and prevents double slashes // if both have slashes.
  function buildUrl(base, sub) {
    let cleanBase = base.endsWith("/") ? base.slice(0, -1) : base;
    if (!sub || sub.trim() === "") {
      return cleanBase;
    }
    let cleanSub = sub.startsWith("/") ? sub : "/" + sub;
    return cleanBase + cleanSub;
  }

  const FULL_URL = buildUrl(BASE_URL, SUB_FOLDER);

  // --- UI LOGIC ---
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      document.getElementById("loadingScreen").classList.add("hidden");
    }, 120);
  });

  function playOnSite() {
    document.getElementById("menuWrapper").style.display = "none";
    document.getElementById("iframeContainer").style.display = "block";
    document.getElementById("siteFrame").src = FULL_URL;
  }

  function openFullscreen() {
    const win = window.open("about:blank", "_blank");
    if(!win) {
        alert("Pop-up blocked! Please allow pop-ups for Fullscreen mode.");
        return;
    }
    win.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>ActivityLab - Fullscreen</title>
        <style>
          html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }
          iframe { width: 100%; height: 100%; border: none; }
        </style>
      </head>
      <body>
        <iframe src="${FULL_URL}" allowfullscreen></iframe>
      </body>
      </html>
    `);
    win.document.close();
  }
</script>

</body>
</html>

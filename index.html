<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ActivityLab</title>

<style>
  /* ===== PAGE / BACKGROUND BEVEL ===== */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #bcbcbc;
    box-shadow:
      inset 4px 4px 0 #ffffff,
      inset -4px -4px 0 #8a8a8a,
      inset 8px 8px 0 #dfdfdf,
      inset -8px -8px 0 #5a5a5a;
    overflow: hidden;
  }

  /* ===== LOADING SCREEN ===== */
  #loadingScreen {
    position: fixed;
    inset: 0;
    background: #bcbcbc;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    z-index: 100;
    transition: opacity 0.25s ease;
  }

  #loadingScreen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== CENTER PANEL ===== */
  #menuWrapper {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #menu {
    background: #e0e0e0;
    padding: 60px 80px;
    border-radius: 12px;
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.9),
      inset -3px -3px 0 rgba(0,0,0,0.35),
      8px 8px 16px rgba(0,0,0,0.35);
  }

  #menuContent {
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  /* ===== BUTTONS ===== */
  .btn {
    background: linear-gradient(145deg, #00ff33, #00c82a);
    color: white;
    font-size: 24px;
    padding: 15px 34px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.45),
      inset -2px -2px 0 rgba(0,0,0,0.35),
      5px 5px 10px rgba(0,0,0,0.45);
    transition: transform 0.08s ease, filter 0.12s ease;
  }

  .btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
  }

  .btn:active {
    transform: translateY(1px);
    filter: brightness(0.95);
  }

  /* ===== IFRAME CONTAINER ===== */
  #iframeContainer {
    position: fixed;
    inset: 0;
    display: none;
    background: #000;
  }

  #iframeContainer iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<div id="loadingScreen">Loading...</div>

<div id="menuWrapper">
  <div id="menu">
    <div id="menuContent">
      <button class="btn" onclick="playOnSite()">Play On Site</button>
      <button class="btn" style="margin-top:10px;" onclick="openFullscreen()">Fullscreen</button>
    </div>
  </div>
</div>

<div id="iframeContainer">
  <iframe id="siteFrame" allowfullscreen></iframe>
</div>

<script>
  // --- CONFIGURATION ---
  const DEFAULT_BASE = "https://race-online-skem.vercel.app"; 

  // --- DYNAMIC URL LOGIC ---
  function getTargetUrl() {
    // This grabs everything after the "/" in your URL
    // e.g., if you visit site.com/google.com, path is "google.com"
    const path = window.location.pathname.substring(1);
    
    if (!path || path === "") {
      return DEFAULT_BASE;
    }

    // Ensure the path has https:// so it loads correctly in the iframe
    if (!path.startsWith('http')) {
      return "https://" + path;
    }
    
    return path;
  }

  const FINAL_URL = getTargetUrl();

  // --- UI LOGIC ---
  window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
      document.getElementById("loadingScreen").classList.add("hidden");
    }, 120);
  });

  function playOnSite() {
    document.getElementById("menuWrapper").style.display = "none";
    document.getElementById("iframeContainer").style.display = "block";
    document.getElementById("siteFrame").src = FINAL_URL;
  }

  function openFullscreen() {
    const win = window.open("about:blank", "_blank");
    if (win) {
      win.document.write(`
        <html>
          <head>
            <title>ActivityLab</title>
            <style>
              body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
              iframe { width: 100%; height: 100%; border: none; }
            </style>
          </head>
          <body>
            <iframe src="${FINAL_URL}" allowfullscreen></iframe>
          </body>
        </html>
      `);
      win.document.close();
    } else {
      alert("Pop-up blocked!");
    }
  }
</script>

</body>
</html>
